<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Workflow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">

    <header class="page-header">
      <div class="header-text">
        <p class="eyebrow">Combined Practice View</p>
        <h1>Staff Workflow Dashboard</h1>
        <p class="page-note">This dashboard merges the live Sujansky and Daniher workflow feeds into one shared staff view.</p>
      </div>
      <div class="header-actions">
        <span id="sync-status" data-state="syncing">Connecting...</span>
      </div>
    </header>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="list-controls">
      <input
        id="search"
        type="search"
        placeholder="Search by patient, destination, or practice..."
        class="search-input"
        oninput="onSearch()"
        autocomplete="off"
      />
    </div>

    <div class="practice-filters" role="tablist" aria-label="Practice filter">
      <button class="practice-filter is-active" type="button" data-practice-filter="all">All</button>
      <button class="practice-filter" type="button" data-practice-filter="sujansky">Sujansky</button>
      <button class="practice-filter" type="button" data-practice-filter="daniher">Daniher</button>
    </div>

    <div id="archive-drawer"></div>

    <section>
      <div id="patient-list" class="patient-list"></div>
    </section>

  </div>

  <script src="../sujansky-workflow/workflow-data.js"></script>
  <script src="../daniher-travel-workflow/workflow-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
